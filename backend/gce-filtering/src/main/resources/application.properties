spring.application.name=gce-filtering

# Force Hibernate to generate the database schema tables first
spring.jpa.hibernate.ddl-auto=update

# Defer data.sql execution until AFTER Hibernate has created the tables
spring.jpa.defer-datasource-initialization=true

# Show SQL queries in the terminal (helpful for debugging)
spring.jpa.show-sql=true

# ================= SECURE H2 CONSOLE CONFIGURATION =================
# Enable the H2 web console interface
spring.h2.console.enabled=true

# Change the access path from the default '/h2-console' to a hidden custom endpoint
# This prevents random scanning tools from easily finding your database login page
spring.h2.console.path=/gce-secure-db-panel

# Explicitly block other computers or unauthorized local origins from loading the console via frames
spring.h2.console.settings.web-allow-others=false
# ===================================================================

# Give the database a fixed, clean name and prevent it from dropping data before initialization finishes
spring.datasource.url=jdbc:h2:mem:gcedb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver

# Prevent UI layout crashing due to default clickjacking header properties
spring.main.allow-bean-definition-overriding=true

# Set your custom username and password
# The database engine will now require these exact parameters to grant access
spring.datasource.username=desmond
spring.datasource.password=gcepass123